<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GilSena Web Rádio</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GilSena Rádio">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/6a11cb/ffffff?text=GS">
    <meta name="theme-color" content="#6a11cb">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root {
            --primary: #6a11cb;
            --secondary: #2575fc;
            --accent: #ff007f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff007f, #210044);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Header */
        .header {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 40px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Ticker Flutuante */
        .ticker-container {
            width: 80%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 50px;
            margin-bottom: 20px;
            overflow: hidden;
            white-space: nowrap;
            border: 1px solid var(--accent);
        }

        .ticker-text {
            display: inline-block;
            animation: ticker 15s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Player Central */
        .player-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 50px;
            text-align: center;
            width: 280px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-play {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 30px;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 0 20px var(--accent);
        }

        .btn-play:active { transform: scale(0.9); }

        /* Equalizer */
        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            height: 50px;
            margin-top: 20px;
        }

        .bar {
            width: 5px;
            background: var(--accent);
            height: 5px;
            border-radius: 2px;
            transition: height 0.1s;
        }

        /* Volume Slider */
        .volume-container {
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* Spinner */
        #loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .share-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>GilSena Web Rádio</h1>
    </div>

    <div class="ticker-container">
        <div class="ticker-text" id="ticker">
            🎶 Bem-vindo à GilSena Web Rádio • Slogan: A rádio que conecta você! • Ouvintes Online: <span id="viewers">...</span> • Fique ligado!
        </div>
    </div>

    <div class="player-card">
        <div id="loader"></div>
        
        <button class="btn-play" id="playBtn">▶</button>
        
        <div class="visualizer" id="visualizer">
            </div>

        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="0.8">
            <span>🔊</span>
        </div>

        <button class="share-btn" onclick="shareApp()">Compartilhar Rádio</button>
    </div>

    <audio id="audioElement"></audio>

    <script>
        // CONFIGURAÇÕES
        const STREAM_URL = "https://github.com/senagil/gilsena-radio/blob/main/minha-playlist-m3u.m3u"; // Ex: https://stream.exemplo.com/live.m3u8
        const audio = document.getElementById('audioElement');
        const playBtn = document.getElementById('playBtn');
        const loader = document.getElementById('loader');
        const visualizer = document.getElementById('visualizer');
        const viewersCount = document.getElementById('viewers');

        // Inicializar Visualizer
        for(let i=0; i<15; i++) {
            let bar = document.createElement('div');
            bar.className = 'bar';
            visualizer.appendChild(bar);
        }

        // Controle de Play/Pause
        let isPlaying = false;
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = "▶";
                stopVisualizer();
            } else {
                loader.style.display = "block";
                if (Hls.isSupported() && STREAM_URL.includes('m3u8')) {
                    const hls = new Hls();
                    hls.loadSource(STREAM_URL);
                    hls.attachMedia(audio);
                } else {
                    audio.src = STREAM_URL;
                }
                audio.play().catch(e => console.error("Erro ao tocar:", e));
                playBtn.innerHTML = "⏸";
                startVisualizer();
            }
            isPlaying = !isPlaying;
        });

        audio.onplaying = () => { loader.style.display = "none"; };
        audio.onwaiting = () => { loader.style.display = "block"; };

        // Volume
        document.getElementById('volume').addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // Simulação de Ouvintes e Metadados
        setInterval(() => {
            const simulated = Math.floor(Math.random() * (150 - 80) + 80);
            viewersCount.innerText = simulated;
        }, 5000);

        // Animação de Barras (Visualizador de áudio falso para performance)
        let vizInterval;
        function startVisualizer() {
            const bars = document.querySelectorAll('.bar');
            vizInterval = setInterval(() => {
                bars.forEach(bar => {
                    const height = Math.random() * 45 + 5;
                    bar.style.height = height + 'px';
                });
            }, 150);
        }
        function stopVisualizer() {
            clearInterval(vizInterval);
            document.querySelectorAll('.bar').forEach(b => b.style.height = '5px');
        }

        // Função Compartilhar
        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'GilSena Web Rádio',
                    text: 'Ouvindo a melhor música na GilSena Web Rádio!',
                    url: window.location.href
                });
            } else {
                alert("Link da rádio copiado para a área de transferência!");
                navigator.clipboard.writeText(window.location.href);
            }
        }

        // Service Worker Integrado (Instalação e Offline)
        const swContent = `
            const CACHE_NAME = 'gilsena-v1';
            self.addEventListener('install', (e) => {
                e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['./'])));
            });
            self.addEventListener('fetch', (e) => {
                e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
            });
        `;
        const blob = new Blob([swContent], {type: 'text/javascript'});
        const swUrl = URL.createObjectURL(blob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl);
        }

        // Manifest.json Dinâmico
        const manifest = {
            "name": "GilSena Web Rádio",
            "short_name": "GilSena",
            "start_url": "./",
            "display": "standalone",
            "background_color": "#210044",
            "theme_color": "#6a11cb",
            "icons": [
                { "src": "https://via.placeholder.com/192/6a11cb/ffffff?text=GS", "sizes": "192x192", "type": "image/png" },
                { "src": "https://via.placeholder.com/512/ff007f/ffffff?text=GilSena", "sizes": "512x512", "type": "image/png" }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);
    </script>
</body>
</html>
